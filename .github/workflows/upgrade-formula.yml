# ~~ Generated by projen. To modify, edit .projenrc.js and run "npx projen".

name: upgrade-formula
on:
  schedule:
    - cron: 0 0 * * *
  workflow_dispatch:
    inputs:
      formulas:
        description: Comma separated list of formulas to update (e.g. jaw.rb,Casks/woof.rb). Leave empty to update all.
        required: false
        default: ""
jobs:
  upgrade:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2
      - uses: actions/setup-node@v4
        with:
          node-version: 24.9.0
          registry-url: https://npm.pkg.github.com
          cache: pnpm
      - name: Install dependencies
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm i --frozen-lockfile
      - name: Upgrade formulas
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |-
          
          FORMULAS="${{ github.event.inputs.formulas }}"
          if [ -z "$FORMULAS" ]; then
            node scripts/update-formulas.js aws-credentials-switcher.rb jaw.rb pretty-logs.rb ssm-env.rb
          else
            node scripts/update-formulas.js $(echo $FORMULAS | tr ',' ' ')
          fi
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit_message: "chore: upgrade homebrew formulas"
          title: "chore: upgrade homebrew formulas"
          body: This PR upgrades the homebrew formulas to their latest versions.
          branch: chore/upgrade-formulas
