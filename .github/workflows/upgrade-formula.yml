# ~~ Generated by projen. To modify, edit .projenrc.js and run "npx projen".

name: upgrade-formula
on:
  schedule:
    - cron: 0 0 * * *
  workflow_dispatch:
    inputs:
      formulas:
        description: Comma separated list of formulas to update (e.g. jaw.rb,Casks/woof.rb). Leave empty to update all.
        required: false
        default: ""
jobs:
  upgrade:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Generate token
        id: generate_token
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf
        with:
          app-id: ${{ secrets.PROJEN_APP_ID }}
          private-key: ${{ secrets.PROJEN_APP_PRIVATE_KEY }}
          contents: write
          pullRequests: write
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
      - name: Setup pnpm
        uses: pnpm/action-setup@c5ba7f7862a0f64c1b1a05fbac13e0b8e86ba08c
        with:
          version: 10.30.3
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24.9.0
          registry-url: https://npm.pkg.github.com
          cache: pnpm
      - name: Install dependencies
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm i --frozen-lockfile
      - name: Upgrade formulas
        env:
          GITHUB_TOKEN: ${{ steps.generate_token.outputs.token }}
        run: |-
          
          FORMULAS="${{ github.event.inputs.formulas }}"
          if [ -z "$FORMULAS" ]; then
            node scripts/update-formulas.js aws-credentials-switcher.rb jaw.rb pretty-logs.rb ssm-env.rb
          else
            node scripts/update-formulas.js $(echo $FORMULAS | tr ',' ' ')
          fi
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ steps.generate_token.outputs.token }}
          commit_message: "chore: upgrade homebrew formulas"
          title: "chore(upgrade): upgrade homebrew formulas"
          body: This PR upgrades the homebrew formulas to their latest versions.
          branch: chore/upgrade-formulas
